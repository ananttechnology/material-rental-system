<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.J. Construction Rental Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .status { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventory Entry</h1>
    <p>Use this to add new stock to your warehouse.</p>
    
    <div class="form-group">
        <label>Item Name</label>
        <select id="itemName" onchange="updateCategories()">
            <option value="">--Select Item--</option>
            <option value="Vertical">Vertical</option>
            <option value="Ledger">Ledger</option>
            <option value="MS Plate">MS Plate</option>
        </select>
    </div>

    <div id="categoryGroup" class="form-group">
        <label>Category (Size)</label>
        <select id="category">
            <option value="">--Select Size--</option>
        </select>
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="quantity" placeholder="Enter number of items">
    </div>

    <button onclick="submitData()">Add to Inventory</button>

    <div id="statusBox" class="status"></div>
</div>

<script>
    // Logic to update Category based on Item Name
    function updateCategories() {
        const item = document.getElementById('itemName').value;
        const catDropdown = document.getElementById('category');
        catDropdown.innerHTML = '<option value="">--Select Size--</option>';

        const options = {
            'Vertical': ['2 mtr', '3 mtr'],
            'Ledger': ['900 mm', '1200 mm'],
            'MS Plate': ['3 x 24']
        };

        if (item && options[item]) {
            options[item].forEach(size => {
                let opt = document.createElement('option');
                opt.value = size;
                opt.innerHTML = size;
                catDropdown.appendChild(opt);
            });
        }
    }

    async function submitData() {
        const data = {
            itemName: document.getElementById('itemName').value,
            category: document.getElementById('category').value,
            totalStock: document.getElementById('quantity').value,
            availableStock: document.getElementById('quantity').value
        };

        const statusBox = document.getElementById('statusBox');

        try {
            // We will link this to your Render URL in the next step
            const response = await fetch('https://material-backend-trial.onrender.com/add-item', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                statusBox.style.display = 'block';
                statusBox.style.backgroundColor = '#d4edda';
                statusBox.innerText = "Success! Item added to Database.";
            }
        } catch (err) {
            alert("Error connecting to server");
        }
    }
</script>

</body>
</html>
