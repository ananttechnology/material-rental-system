<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Material Management System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #28a745; position: relative; }
        .dispatch-sec { border-top-color: #dc3545; }
        .return-sec { border-top-color: #007bff; }
        .report-sec { border-top-color: #ffc107; }
        .bill-sec { border-top-color: #6f42c1; }
        .pay-sec { border-top-color: #e83e8c; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.3rem; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; margin-top: 10px;}
        .sync-btn { background: #6c757d; font-size: 0.75rem; padding: 5px 10px; width: auto; position: absolute; top: 20px; right: 25px; margin: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .total-box { margin-top: 20px; padding: 15px; background: #f1f3f5; border-radius: 8px; text-align: right; border: 1px solid #dee2e6; }
        /* Style for the new validation messages */
        .msg-area { margin-top: 10px; font-weight: bold; font-size: 0.9rem; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="section">
    <h2>1. Create Builder Profile</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <input type="text" id="compName" placeholder="Company Name *">
        <input type="text" id="bMobile" placeholder="Mobile Number">
        <input type="email" id="bEmail" placeholder="Email">
        <input type="text" id="bGst" placeholder="GST Number">
    </div>
    <textarea id="bAddr" placeholder="Office Address"></textarea>
    <button onclick="saveBuilder()">Save Builder</button>
    <div id="msg1" class="msg-area"></div>
</div>

<div class="section">
    <h2>2. Add Site to Builder</h2>
    <select id="builderSelect"></select>
    <div class="grid">
        <input type="text" id="sName" placeholder="Site Name *">
        <input type="text" id="sAddr" placeholder="Location">
    </div>
    <button onclick="saveSite()">Link Site</button>
    <div id="msg2" class="msg-area"></div>
</div>

<div class="section">
    <h2>3. Inventory Entry</h2>
    <div class="grid">
        <select id="itemName" onchange="updateCategories()">
            <option value="">--Item--</option>
            <option value="MS Plate">MS Plate</option>
            <option value="MS Props Jack">MS Props Jack</option>
            <option value="Cuplock Vertical">Cuplock Vertical</option>
            <option value="MS Ledger">MS Ledger</option>
            <option value="Ms Pipe">Ms Pipe</option>
            <option value="Channel">Channel</option>
            <option value="Ms Clamp">Ms Clamp</option>
            <option value="Acrow Span">Acrow Span</option>
            <option value="Base Jack">Base Jack</option>
            <option value="U Jack">U Jack</option>
            <option value="Joint Pin">Joint Pin</option>
            <option value="Ms Khapeda">Ms Khapeda</option>
            <option value="Wood Chavi">Wood Chavi</option>
            <option value="Sikanja">Sikanja</option>
        </select>
        <select id="category"><option value="N/A">N/A</option></select>
    </div>
    <input type="number" id="qty" placeholder="Quantity to Add">
    <button onclick="saveItem()" style="background: #17a2b8;">Add Stock</button>
    <div id="msg3" class="msg-area"></div>
</div>

<div class="section dispatch-sec">
    <h2>4. Dispatch (DC)</h2>
    <div class="grid">
        <select id="dBuilder" onchange="loadSites('dBuilder','dSite')"></select>
        <select id="dSite"></select>
    </div>
    <div class="grid">
        <select id="dItem" onchange="showStock('dItem','stockStatus')"></select>
        <span id="stockStatus">Available: 0</span>
    </div>
    <div class="grid">
        <input type="number" id="dQty" placeholder="Qty">
        <input type="number" id="dRate" placeholder="Rate">
    </div>
    <div class="grid">
        <input type="number" id="dLoading" placeholder="Loading Charges (₹)">
        <input type="date" id="dDate">
    </div>
    <button style="background:#dc3545" onclick="processTxn('dispatch')">Confirm Dispatch</button>
    <button id="btnPrintDC" class="print-btn" style="display:none; background:#343a40; color:white;" onclick="printChallan('DC')">🖨️ Print DC</button>
    <div id="msg4" class="msg-area"></div>
</div>

<div class="section return-sec">
    <h2>5. Return (RC)</h2>
    <div class="grid">
        <select id="rBuilder" onchange="loadSites('rBuilder','rSite')"></select>
        <select id="rSite" onchange="loadReturnItems()"></select>
    </div>
    <select id="rItem"></select>
    <div class="grid">
        <input type="number" id="rQty" placeholder="Qty Returned">
        <input type="number" id="rUnloading" placeholder="Unloading Charges (₹)">
    </div>
    <input type="date" id="rDate">
    <button style="background:#007bff" onclick="processTxn('return')">Confirm Return</button>
    <button id="btnPrintRC" class="print-btn" style="display:none; background:#343a40; color:white;" onclick="printChallan('RC')">🖨️ Print RC</button>
    <div id="msg5" class="msg-area"></div>
</div>

<div class="section report-sec">
    <h2>6. Site Stock Report</h2>
    <div class="grid">
        <select id="repBuilder" onchange="loadSites('repBuilder','repSite')"></select>
        <select id="repSite"></select>
    </div>
    <button style="background:#ffc107; color:black" onclick="getSiteReport()">Show Report</button>
    <div id="msg6" class="msg-area"></div>
    <div id="reportContainer"></div>
</div>

<div class="section bill-sec">
    <h2>7. Billing Engine</h2>
    <div class="grid">
        <select id="billBuilder" onchange="loadSites('billBuilder','billSite')"></select>
        <select id="billSite"></select>
    </div>
    <label><input type="checkbox" id="gstToggle" onchange="updateBillDisplay()"> GST 18%</label>
    <button style="background:#6f42c1" onclick="generateBill()">Generate Bill</button>
    <button class="print-btn" style="display:inline-block; background:#343a40; color:white;" onclick="printDoc('billDisplay', 'RENTAL INVOICE')">🖨️ Print Bill</button>
    <div id="msg7" class="msg-area"></div>
    <div id="billDisplay"></div>
</div>

<div class="section pay-sec">
    <h2>8. Payment Tracking (Builder Ledger)</h2>
    <select id="pBuilder" onchange="loadLedger()"><option value="">-- Select Builder --</option></select>
    <div class="grid">
        <input type="number" id="pAmount" placeholder="Amount Paid (₹)">
        <select id="pMode">
            <option value="Cash">Cash</option>
            <option value="Online / G-Pay">Online / G-Pay</option>
            <option value="Cheque">Cheque</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select>
    </div>
    <div class="grid">
        <input type="text" id="pRef" placeholder="Reference No. (Cheque / UTR)">
        <input type="date" id="pDate">
    </div>
    <button style="background:#e83e8c" onclick="recordPayment()">Record Payment Receipt</button>
    <div id="msg8" class="msg-area"></div>
    <div id="ledgerDisplay"></div>
</div>

<script>
    const API_URL = 'https://material-backend-trial.onrender.com';
    let fullInventory = [];
    let lastTxn = null;
    let currentBillData = [];
    let currentServiceTotal = 0;

    // --- UTILITY: Validation & Message Handler ---
    function validate(fields, msgId) {
        const msg = document.getElementById(msgId);
        for (let key in fields) {
            // Check if value is null, undefined, or empty string after trimming
            if (fields[key] === null || fields[key] === undefined || fields[key].toString().trim() === "") {
                msg.style.color = "red";
                msg.innerHTML = "⚠️ Error: Please fill all compulsory boxes.";
                return false;
            }
        }
        msg.innerHTML = ""; // Clear error if all good
        return true;
    }

    function showSuccess(msgId, text) {
        const msg = document.getElementById(msgId);
        msg.style.color = "green";
        msg.innerHTML = "✅ " + text;
        setTimeout(() => msg.innerHTML = "", 5000);
    }

    // --- CORE FUNCTIONS ---
    async function masterSync() {
        await loadBuilders();
        await initInventory();
    }

    async function loadBuilders() {
        try {
            const res = await fetch(`${API_URL}/builders`);
            const data = await res.json();
            ['builderSelect', 'dBuilder', 'rBuilder', 'repBuilder', 'billBuilder', 'pBuilder'].forEach(id => {
                const s = document.getElementById(id);
                if(s) {
                    const currentVal = s.value;
                    s.innerHTML = '<option value="">-- Select Builder --</option>';
                    data.forEach(b => s.innerHTML += `<option value="${b._id}">${b.companyName}</option>`);
                    s.value = currentVal;
                }
            });
        } catch (e) { console.error("Builder Load Fail", e); }
    }

    async function initInventory() {
        try {
            const res = await fetch(`${API_URL}/inventory`);
            fullInventory = await res.json();
            const dItem = document.getElementById('dItem');
            if(dItem) {
                dItem.innerHTML = '<option value="">-- Select Item --</option>';
                fullInventory.forEach(i => dItem.innerHTML += `<option value="${i._id}">${i.itemName} (${i.category})</option>`);
            }
        } catch (e) { console.error("Inventory Load Fail", e); }
    }

    async function saveBuilder() {
        const body = {
            companyName: document.getElementById('compName').value,
            mobile: document.getElementById('bMobile').value,
            email: document.getElementById('bEmail').value,
            gstNumber: document.getElementById('bGst').value,
            address: document.getElementById('bAddr').value
        };
        if (!validate(body, 'msg1')) return;
        
        await fetch(`${API_URL}/add-builder`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        showSuccess('msg1', "Builder Profile Created!");
        masterSync();
    }

    async function saveSite() {
        const body = {
            builderId: document.getElementById('builderSelect').value,
            siteName: document.getElementById('sName').value,
            siteAddress: document.getElementById('sAddr').value
        };
        if (!validate(body, 'msg2')) return;
        
        await fetch(`${API_URL}/add-site`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        showSuccess('msg2', "Site Linked to Builder!");
    }

    async function saveItem() {
        const body = {
            itemName: document.getElementById('itemName').value,
            category: document.getElementById('category').value,
            totalStock: document.getElementById('qty').value
        };
        if (!validate(body, 'msg3')) return;
        
        await fetch(`${API_URL}/add-item`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        showSuccess('msg3', "Inventory Stock Updated!");
        masterSync();
    }

    async function processTxn(type) {
        const p = type === 'dispatch' ? 'd' : 'r';
        const msgId = type === 'dispatch' ? 'msg4' : 'msg5';
        const body = {
            builderId: document.getElementById(`${p}Builder`).value,
            siteId: document.getElementById(`${p}Site`).value,
            itemId: document.getElementById(`${p}Item`).value,
            quantity: document.getElementById(`${p}Qty`).value,
            date: document.getElementById(`${p}Date`).value,
            rate: type === 'dispatch' ? document.getElementById(`dRate`).value : 0,
            loadingCharges: type === 'dispatch' ? document.getElementById(`dLoading`).value : 0,
            unloadingCharges: type === 'return' ? document.getElementById(`rUnloading`).value : 0
        };
        
        if (!validate(body, msgId)) return;
        
        const res = await fetch(`${API_URL}/${type}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        const result = await res.json();
        
        if(res.ok) {
            showSuccess(msgId, `Confirmed! Challan: ${result.challanNo}`);
            lastTxn = { ...body, challanNo: result.challanNo, 
                builder: document.getElementById(`${p}Builder`).options[document.getElementById(`${p}Builder`).selectedIndex].text,
                site: document.getElementById(`${p}Site`).options[document.getElementById(`${p}Site`).selectedIndex].text,
                item: document.getElementById(`${p}Item`).options[document.getElementById(`${p}Item`).selectedIndex].text
            };
            document.getElementById(type === 'dispatch' ? 'btnPrintDC' : 'btnPrintRC').style.display = 'block';
            masterSync();
        } else {
            document.getElementById(msgId).style.color = "red";
            document.getElementById(msgId).innerHTML = "❌ " + result.message;
        }
    }

    async function getSiteReport() {
        const siteId = document.getElementById('repSite').value;
        const bId = document.getElementById('repBuilder').value;
        if (!validate({bId, siteId}, 'msg6')) return;
        
        const res = await fetch(`${API_URL}/site-balance/${siteId}`);
        const data = await res.json();
        let h = '<table><tr><th>Item</th><th>Qty on Site</th></tr>';
        data.forEach(i => h += `<tr><td>${i.itemName} (${i.category})</td><td>${i.currentBalance}</td></tr>`);
        document.getElementById('reportContainer').innerHTML = h + '</table>';
        showSuccess('msg6', "Report Generated.");
    }

    async function generateBill() {
        const bId = document.getElementById('billBuilder').value;
        const siteId = document.getElementById('billSite').value;
        if (!validate({bId, siteId}, 'msg7')) return;
        
        const res = await fetch(`${API_URL}/calculate-bill/${siteId}`);
        const data = await res.json();
        currentBillData = data.billDetails;
        currentServiceTotal = data.serviceCharges;
        updateBillDisplay();
        showSuccess('msg7', "Bill Calculated Successfully.");
    }

    async function recordPayment() {
        const body = {
            builderId: document.getElementById('pBuilder').value,
            amountPaid: document.getElementById('pAmount').value,
            paymentMode: document.getElementById('pMode').value,
            referenceNo: document.getElementById('pRef').value,
            date: document.getElementById('pDate').value
        };
        if (!validate(body, 'msg8')) return;
        
        await fetch(`${API_URL}/add-payment`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        showSuccess('msg8', "Payment Recorded!");
        loadLedger();
    }

    async function loadLedger() {
        const bId = document.getElementById('pBuilder').value;
        if (!bId) {
            document.getElementById('msg8').style.color = "red";
            document.getElementById('msg8').innerHTML = "⚠️ Select Builder to view ledger.";
            return;
        }
        document.getElementById('msg8').innerHTML = "";
        const res = await fetch(`${API_URL}/statement/${bId}`);
        const data = await res.json();
        let h = `<div class="total-box" style="text-align:left;"><p>Total Billed: ₹${data.totalBilled.toFixed(2)}</p><p>Total Paid: ₹${data.totalPaid.toFixed(2)}</p><h3>Outstanding: ₹${(data.totalBilled - data.totalPaid).toFixed(2)}</h3></div><h3>Payment History</h3><table><tr><th>Date</th><th>Mode</th><th>Ref</th><th>Amt</th></tr>`;
        data.payments.forEach(p => h += `<tr><td>${new Date(p.date).toLocaleDateString()}</td><td>${p.paymentMode}</td><td>${p.referenceNo}</td><td>₹${p.amountPaid}</td></tr>`);
        document.getElementById('ledgerDisplay').innerHTML = h + '</table>';
    }

    // --- SHARED HELPERS ---
    async function loadSites(bId, sId) {
        const val = document.getElementById(bId).value;
        if(!val) return;
        const res = await fetch(`${API_URL}/sites/${val}`);
        const data = await res.json();
        const s = document.getElementById(sId);
        s.innerHTML = '<option value="">-- Select Site --</option>';
        data.forEach(site => s.innerHTML += `<option value="${site._id}">${site.siteName}</option>`);
    }

    function updateCategories() {
        const item = document.getElementById('itemName').value;
        const cat = document.getElementById('category');
        cat.innerHTML = '';
        const data = { 'MS Plate': ['3 x 24', '3 x 21', '3 x 18', '3 x 15', '3 x 12', '3 x 9', '3 x 6'], 'MS Props Jack': ['3 x 3', '2.5 x 2.5', '2 x 2'], 'Cuplock Vertical': ['3 Mtr', '2.5 Mtr', '2 Mtr', '1.5 Mtr', '1 Mtr', '0.5 Mtr'], 'MS Ledger': ['900 mm', '1200 mm', '1500 mm'], 'Ms Pipe': ['6 mtr', '3 mtr'], 'Channel': ['6 mtr', '3 mtr'], 'Ms Clamp': ['Fix', 'Round (360°)'] };
        (data[item] || ['N/A']).forEach(s => cat.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function showStock(id, label) {
        const item = fullInventory.find(i => i._id === document.getElementById(id).value);
        document.getElementById(label).innerText = item ? `Available: ${item.availableStock}` : 'Available: 0';
    }

    async function loadReturnItems() {
        const siteId = document.getElementById('rSite').value;
        if(!siteId) return;
        const res = await fetch(`${API_URL}/site-balance/${siteId}`);
        const data = await res.json();
        const rItem = document.getElementById('rItem');
        rItem.innerHTML = '<option value="">-- Select Item --</option>';
        data.forEach(i => rItem.innerHTML += `<option value="${i.itemId}">${i.itemName} (${i.category}) [Bal: ${i.currentBalance}]</option>`);
    }

    function updateBillDisplay() {
        let h = '<table><tr><th>Item</th><th>Qty</th><th>Duration</th><th>Days</th><th>Rate</th><th>Amt</th></tr>';
        let subRent = 0;
        currentBillData.forEach(i => {
            h += `<tr><td>${i.itemName}</td><td>${i.qty}</td><td>${i.dDate} to ${i.rDate}</td><td>${i.days}</td><td>${i.rate}</td><td>₹${i.amount}</td></tr>`;
            subRent += i.amount;
        });
        let subtotal = subRent + currentServiceTotal;
        const gst = document.getElementById('gstToggle').checked ? subtotal * 0.18 : 0;
        document.getElementById('billDisplay').innerHTML = h + `</table><div class="total-box"><p>Total Rent: ₹${subRent.toFixed(2)}</p><p>Loading/Unloading: ₹${currentServiceTotal.toFixed(2)}</p>${document.getElementById('gstToggle').checked ? `<p>GST (18%): ₹${gst.toFixed(2)}</p>` : ''}<h3>Grand Total: ₹${(subtotal + gst).toFixed(2)}</h3></div>`;
    }

    function printDoc(el, title) {
        const content = document.getElementById(el).innerHTML;
        const win = window.open('', '', 'height=600,width=800');
        win.document.write('<html><head><title>'+title+'</title><style>body{font-family:sans-serif;padding:40px;} table{width:100%;border-collapse:collapse;margin-top:20px;} th,td{border:1px solid #ddd;padding:10px;text-align:left;} th{background:#eee;} .header{text-align:center;margin-bottom:30px;}</style></head><body>');
        win.document.write('<div class="header"><h1>YOUR COMPANY NAME</h1><h2>'+title+'</h2></div>' + content + '</body></html>');
        win.document.close();
        win.print();
    }

    function printChallan(type) {
        if(!lastTxn) return;
        const title = type === 'DC' ? "DISPATCH CHALLAN" : "RETURN CHALLAN";
        const win = window.open('', '', 'height=600,width=800');
        win.document.write('<html><head><title>'+title+'</title><style>body{font-family:sans-serif;padding:40px;} table{width:100%;border-collapse:collapse;margin-top:20px;} th,td{border:1px solid #ddd;padding:12px;text-align:left;} .header{text-align:center;border-bottom:2px solid #333;margin-bottom:20px;} .footer{margin-top:50px;display:flex;justify-content:space-between;}</style></head><body>');
        win.document.write('<div class="header"><h1>COMPANY NAME</h1><p><b>Challan No:</b> '+lastTxn.challanNo+' | <b>Date:</b> '+lastTxn.date+'</p><h2>'+title+'</h2></div>');
        win.document.write('<p><b>Builder:</b> '+lastTxn.builder+'<br><b>Site:</b> '+lastTxn.site+'</p>');
        win.document.write('<table><tr><th>Description</th><th>Qty</th></tr><tr><td>'+lastTxn.item+'</td><td>'+lastTxn.quantity+'</td></tr></table>');
        win.document.write('<div class="footer"><div><p>_________________<br>Receiver</p></div><div><p>_________________<br>Authorised</p></div></div></body></html>');
        win.document.close();
        win.print();
    }

    window.onload = masterSync;
</script>
</body>
</html>
