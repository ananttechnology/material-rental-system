<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.J. Construction Management</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #28a745; padding-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="section">
    <h2>1. Add Builder & Site</h2>
    <input type="text" id="bName" placeholder="Builder / Company Name">
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="text" id="gst" placeholder="GST Number (Optional)">
    <input type="text" id="sName" placeholder="Site Name (e.g. Dahej Jolva)">
    <textarea id="sAddr" placeholder="Site Address" style="width:100%; height:60px;"></textarea>
    <button onclick="saveSite()">Save Builder & Site</button>
</div>

<div class="section">
    <h2>2. Inventory Entry</h2>
    <select id="itemName" onchange="updateCategories()">
        <option value="">--Select Item--</option>
        <option value="MS Plate">MS Plate</option>
        <option value="Cuplock Vertical">Cuplock Vertical</option>
        <option value="Joint Pin">Joint Pin</option>
    </select>
    <select id="category"><option value="N/A">N/A</option></select>
    <input type="number" id="qty" placeholder="Quantity">
    <button onclick="saveItem()">Add Stock</button>
</div>

<script>
    function updateCategories() {
        const item = document.getElementById('itemName').value;
        const cat = document.getElementById('category');
        cat.innerHTML = '';
        const data = {
            'MS Plate': ['3 x 24', '3 x 21', '3 x 18'],
            'Cuplock Vertical': ['3 Mtr', '2.5 Mtr', '2 Mtr'],
            'Joint Pin': ['N/A']
        };
        (data[item] || ['N/A']).forEach(s => {
            let o = document.createElement('option'); o.value = s; o.innerText = s; cat.appendChild(o);
        });
    }

    async function saveSite() {
        const body = {
            builderName: document.getElementById('bName').value,
            mobile: document.getElementById('mobile').value,
            gstNumber: document.getElementById('gst').value,
            siteName: document.getElementById('sName').value,
            siteAddress: document.getElementById('sAddr').value
        };
        const res = await fetch('https://material-backend-trial.onrender.com/add-site', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("Builder & Site Saved!");
    }

    async function saveItem() {
        const body = {
            itemName: document.getElementById('itemName').value,
            category: document.getElementById('category').value,
            totalStock: document.getElementById('qty').value
        };
        const res = await fetch('https://material-backend-trial.onrender.com/add-item', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("Item Added!");
    }
</script>
</body>
</html>
