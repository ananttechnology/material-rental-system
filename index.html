<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.J. Construction Management System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #28a745; }
        .dispatch-sec { border-top: 5px solid #dc3545; }
        h2 { color: #2c3e50; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .dispatch-btn { background: #dc3545; }
        .stock-label { color: #666; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="section dispatch-sec">
    <h2>4. Material Dispatch (Generate DC)</h2>
    <div class="grid">
        <select id="dBuilder" onchange="loadDispatchSites()">
            <option value="">-- Select Builder --</option>
        </select>
        <select id="dSite">
            <option value="">-- Select Site --</option>
        </select>
    </div>
    <div class="grid">
        <select id="dItem" onchange="showAvailableStock()">
            <option value="">-- Select Item to Send --</option>
        </select>
        <div style="padding-top:15px;"><span class="stock-label" id="stockStatus">Available: 0</span></div>
    </div>
    <div class="grid">
        <input type="number" id="dQty" placeholder="Quantity to Send">
        <input type="number" id="dRate" placeholder="Rate per Day">
    </div>
    <input type="date" id="dDate">
    <button class="dispatch-btn" onclick="processDispatch()">Confirm Dispatch (Generate DC)</button>
</div>

<script>
    const API_URL = 'https://material-backend-trial.onrender.com';
    let fullInventory = [];

    // Load Builders into Dispatch Dropdown
    async function initDispatch() {
        const resB = await fetch(`${API_URL}/builders`);
        const builders = await resB.json();
        const bSel = document.getElementById('dBuilder');
        builders.forEach(b => bSel.innerHTML += `<option value="${b._id}">${b.companyName}</option>`);

        const resI = await fetch(`${API_URL}/inventory`);
        fullInventory = await resI.json();
        const iSel = document.getElementById('dItem');
        fullInventory.forEach(item => iSel.innerHTML += `<option value="${item._id}">${item.itemName} (${item.category})</option>`);
    }

    async function loadDispatchSites() {
        const bId = document.getElementById('dBuilder').value;
        const sSel = document.getElementById('dSite');
        sSel.innerHTML = '<option value="">-- Select Site --</option>';
        const res = await fetch(`${API_URL}/sites/${bId}`);
        const sites = await res.json();
        sites.forEach(s => sSel.innerHTML += `<option value="${s._id}">${s.siteName}</option>`);
    }

    function showAvailableStock() {
        const itemId = document.getElementById('dItem').value;
        const item = fullInventory.find(i => i._id === itemId);
        document.getElementById('stockStatus').innerText = item ? `Available in Yard: ${item.availableStock}` : 'Available: 0';
    }

    async function processDispatch() {
        const body = {
            builderId: document.getElementById('dBuilder').value,
            siteId: document.getElementById('dSite').value,
            itemId: document.getElementById('dItem').value,
            quantity: Number(document.getElementById('dQty').value),
            rate: Number(document.getElementById('dRate').value),
            date: document.getElementById('dDate').value
        };

        const res = await fetch(`${API_URL}/dispatch`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });

        const result = await res.json();
        if(res.ok) {
            alert(`SUCCESS! Challan Generated: ${result.challanNo}`);
            location.reload(); // Refresh to update stock counts
        } else {
            alert(result.message || "Error during dispatch");
        }
    }

    // Previous scripts (saveBuilder, saveSite, saveItem) remain here...
    // Call initDispatch on load
    window.onload = () => { loadBuilders(); initDispatch(); };
</script>
</body>
</html>
