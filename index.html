<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.J. Construction Management</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #28a745; padding-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .refresh-btn { background: #007bff; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="section">
    <h2>1. Create New Builder (Company)</h2>
    <input type="text" id="compName" placeholder="Company Name">
    <input type="text" id="bMobile" placeholder="Mobile Number">
    <input type="text" id="bGst" placeholder="GST Number">
    <button onclick="saveBuilder()">Save Builder Profile</button>
</div>

<div class="section">
    <h2>2. Add Site to Builder</h2>
    <button class="refresh-btn" onclick="loadBuilders()">Click to Refresh Builder List</button>
    <select id="builderSelect">
        <option value="">-- Select Builder First --</option>
    </select>
    <input type="text" id="sName" placeholder="Site Name (e.g. Dahej Jolva)">
    <input type="text" id="sAddr" placeholder="Site Address">
    <button onclick="saveSite()">Link Site to Builder</button>
</div>

<script>
    const API_URL = 'https://material-backend-trial.onrender.com';

    async function saveBuilder() {
        const body = {
            companyName: document.getElementById('compName').value,
            mobile: document.getElementById('bMobile').value,
            gstNumber: document.getElementById('bGst').value
        };
        const res = await fetch(`${API_URL}/add-builder`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) { alert("Builder Profile Created!"); loadBuilders(); }
    }

    async function loadBuilders() {
        const res = await fetch(`${API_URL}/builders`);
        const builders = await res.json();
        const select = document.getElementById('builderSelect');
        select.innerHTML = '<option value="">-- Select Builder First --</option>';
        builders.forEach(b => {
            let o = document.createElement('option');
            o.value = b._id;
            o.innerText = b.companyName;
            select.appendChild(o);
        });
    }

    async function saveSite() {
        const builderId = document.getElementById('builderSelect').value;
        if(!builderId) return alert("Please select a builder first!");
        
        const body = {
            builderId: builderId,
            siteName: document.getElementById('sName').value,
            siteAddress: document.getElementById('sAddr').value
        };
        const res = await fetch(`${API_URL}/add-site`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("Site successfully linked to Builder!");
    }

    // Load builders automatically when page opens
    window.onload = loadBuilders;
</script>
</body>
</html>
