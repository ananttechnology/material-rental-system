<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.J. Construction Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #28a745; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.4rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #218838; }
        .refresh-btn { background: #007bff; margin-bottom: 15px; }
        .refresh-btn:hover { background: #0069d9; }
    </style>
</head>
<body>

<div class="section">
    <h2>1. Create New Builder (Company Profile)</h2>
    <div class="grid">
        <input type="text" id="compName" placeholder="Company Name *">
        <input type="text" id="bMobile" placeholder="Mobile Number">
        <input type="email" id="bEmail" placeholder="Email Address (Optional)">
        <input type="text" id="bGst" placeholder="GST Number">
    </div>
    <textarea id="bAddr" placeholder="Office Address (Optional)"></textarea>
    <button onclick="saveBuilder()">Save Builder Profile</button>
</div>

<div class="section">
    <h2>2. Add New Site to Builder</h2>
    <button class="refresh-btn" onclick="loadBuilders()">🔄 Sync Builder List</button>
    <select id="builderSelect">
        <option value="">-- Select Builder --</option>
    </select>
    <div class="grid">
        <input type="text" id="sName" placeholder="Site Name (e.g. Dahej Jolva) *">
        <input type="text" id="sAddr" placeholder="Site Address/Location">
    </div>
    <button onclick="saveSite()">Link Site to Builder</button>
</div>

<div class="section">
    <h2>3. Master Inventory Entry</h2>
    <div class="grid">
        <select id="itemName" onchange="updateCategories()">
            <option value="">--Select Item--</option>
            <option value="MS Plate">MS Plate</option>
            <option value="MS Props Jack">MS Props Jack</option>
            <option value="Cuplock Vertical">Cuplock Vertical</option>
            <option value="MS Ledger">MS Ledger</option>
            <option value="Ms Pipe">Ms Pipe</option>
            <option value="Channel">Channel</option>
            <option value="Ms Clamp">Ms Clamp</option>
            <option value="Acrow Span">Acrow Span</option>
            <option value="Base Jack">Base Jack</option>
            <option value="U Jack">U Jack</option>
            <option value="Joint Pin">Joint Pin</option>
            <option value="Ms Khapeda">Ms Khapeda</option>
            <option value="Wood Chavi">Wood Chavi</option>
            <option value="Sikanja">Sikanja</option>
        </select>
        <select id="category"><option value="N/A">N/A (Default)</option></select>
    </div>
    <input type="number" id="qty" placeholder="Current Stock Quantity in Yard">
    <button onclick="saveItem()" style="background: #17a2b8;">Add to Warehouse Stock</button>
</div>

<script>
    const API_URL = 'https://material-backend-trial.onrender.com';

    function updateCategories() {
        const item = document.getElementById('itemName').value;
        const cat = document.getElementById('category');
        cat.innerHTML = '';
        const data = {
            'MS Plate': ['3 x 24', '3 x 21', '3 x 18', '3 x 15', '3 x 12', '3 x 9', '3 x 6'],
            'MS Props Jack': ['3 x 3', '2.5 x 2.5', '2 x 2'],
            'Cuplock Vertical': ['3 Mtr', '2.5 Mtr', '2 Mtr', '1.5 Mtr', '1 Mtr', '0.5 Mtr'],
            'MS Ledger': ['900 mm', '1200 mm', '1500 mm'],
            'Ms Pipe': ['6 mtr', '3 mtr'],
            'Channel': ['6 mtr', '3 mtr'],
            'Ms Clamp': ['Fix', 'Round (360°)']
        };
        const sizes = data[item] || ['N/A'];
        sizes.forEach(s => {
            let o = document.createElement('option'); o.value = s; o.innerText = s; cat.appendChild(o);
        });
    }

    async function saveBuilder() {
        const body = {
            companyName: document.getElementById('compName').value,
            mobile: document.getElementById('bMobile').value,
            email: document.getElementById('bEmail').value,
            gstNumber: document.getElementById('bGst').value,
            address: document.getElementById('bAddr').value
        };
        const res = await fetch(`${API_URL}/add-builder`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) { alert("Builder Saved!"); loadBuilders(); }
    }

    async function loadBuilders() {
        const res = await fetch(`${API_URL}/builders`);
        const builders = await res.json();
        const select = document.getElementById('builderSelect');
        select.innerHTML = '<option value="">-- Select Builder --</option>';
        builders.forEach(b => {
            let o = document.createElement('option'); o.value = b._id; o.innerText = b.companyName; select.appendChild(o);
        });
    }

    async function saveSite() {
        const builderId = document.getElementById('builderSelect').value;
        if(!builderId) return alert("Select builder first!");
        const body = {
            builderId: builderId,
            siteName: document.getElementById('sName').value,
            siteAddress: document.getElementById('sAddr').value
        };
        const res = await fetch(`${API_URL}/add-site`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("Site Linked!");
    }

    async function saveItem() {
        const body = {
            itemName: document.getElementById('itemName').value,
            category: document.getElementById('category').value,
            totalStock: document.getElementById('qty').value
        };
        const res = await fetch(`${API_URL}/add-item`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if(res.ok) alert("Inventory Updated!");
    }

    window.onload = loadBuilders;
</script>
</body>
</html>
