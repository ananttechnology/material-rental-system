<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.J. Construction Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #28a745; position: relative; }
        .dispatch-sec { border-top-color: #dc3545; }
        .return-sec { border-top-color: #007bff; }
        .report-sec { border-top-color: #ffc107; }
        .bill-sec { border-top-color: #6f42c1; }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.3rem; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .dispatch-btn { background: #dc3545; }
        .return-btn { background: #007bff; }
        .report-btn { background: #ffc107; color: black; }
        .bill-btn { background: #6f42c1; }
        .sync-btn { background: #6c757d; font-size: 0.75rem; padding: 5px 10px; width: auto; position: absolute; top: 20px; right: 25px; }
        .stock-label { color: #dc3545; font-weight: bold; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .total-box { margin-top: 20px; padding: 15px; background: #f1f3f5; border-radius: 8px; text-align: right; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="section">
    <h2>1. Create Builder Profile</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <input type="text" id="compName" placeholder="Company Name *">
        <input type="text" id="bMobile" placeholder="Mobile Number">
        <input type="email" id="bEmail" placeholder="Email">
        <input type="text" id="bGst" placeholder="GST Number">
    </div>
    <textarea id="bAddr" placeholder="Office Address"></textarea>
    <button onclick="saveBuilder()">Save Builder</button>
</div>

<div class="section">
    <h2>2. Add Site to Builder</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <select id="builderSelect"><option value="">-- Select Builder --</option></select>
    <div class="grid">
        <input type="text" id="sName" placeholder="Site Name *">
        <input type="text" id="sAddr" placeholder="Location">
    </div>
    <button onclick="saveSite()">Link Site</button>
</div>

<div class="section">
    <h2>3. Inventory Entry</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <select id="itemName" onchange="updateCategories()">
            <option value="">--Select Item--</option>
            <option value="MS Plate">MS Plate</option>
            <option value="MS Props Jack">MS Props Jack</option>
            <option value="Cuplock Vertical">Cuplock Vertical</option>
            <option value="MS Ledger">MS Ledger</option>
            <option value="Ms Pipe">Ms Pipe</option>
            <option value="Channel">Channel</option>
            <option value="Ms Clamp">Ms Clamp</option>
            <option value="Acrow Span">Acrow Span</option>
            <option value="Base Jack">Base Jack</option>
            <option value="U Jack">U Jack</option>
            <option value="Joint Pin">Joint Pin</option>
            <option value="Ms Khapeda">Ms Khapeda</option>
            <option value="Wood Chavi">Wood Chavi</option>
            <option value="Sikanja">Sikanja</option>
        </select>
        <select id="category"><option value="N/A">N/A</option></select>
    </div>
    <input type="number" id="qty" placeholder="Quantity to Add to Yard">
    <button onclick="saveItem()" style="background: #17a2b8;">Add Stock</button>
</div>

<div class="section dispatch-sec">
    <h2>4. Dispatch (DC)</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <select id="dBuilder" onchange="loadSites('dBuilder','dSite')"><option value="">-- Builder --</option></select>
        <select id="dSite"><option value="">-- Site --</option></select>
    </div>
    <div class="grid">
        <select id="dItem" onchange="showStock('dItem','stockStatus')"><option value="">-- Select Item --</option></select>
        <div style="padding-top:15px;"><span class="stock-label" id="stockStatus">Available: 0</span></div>
    </div>
    <div class="grid">
        <input type="number" id="dQty" placeholder="Quantity">
        <input type="number" id="dRate" placeholder="Rate per Day">
    </div>
    <input type="date" id="dDate">
    <button class="dispatch-btn" onclick="processTxn('dispatch')">Confirm Dispatch (DC)</button>
</div>

<div class="section return-sec">
    <h2>5. Return (RC)</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <select id="rBuilder" onchange="loadSites('rBuilder','rSite')"><option value="">-- Builder --</option></select>
        <select id="rSite" onchange="loadReturnItems()"><option value="">-- Site --</option></select>
    </div>
    <select id="rItem"><option value="">-- Select Item (Only on Site) --</option></select>
    <input type="number" id="rQty" placeholder="Quantity Returned">
    <input type="date" id="rDate">
    <button class="return-btn" onclick="processTxn('return')">Confirm Return (RC)</button>
</div>

<div class="section report-sec">
    <h2>6. Site Stock Report</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <select id="repBuilder" onchange="loadSites('repBuilder','repSite')"><option value="">-- Builder --</option></select>
        <select id="repSite"><option value="">-- Site --</option></select>
    </div>
    <button class="report-btn" onclick="getSiteReport()">Generate Report</button>
    <div id="reportContainer"></div>
</div>

<div class="section bill-sec">
    <h2>7. Billing Engine</h2>
    <button class="sync-btn" onclick="masterSync()">🔄 Sync All</button>
    <div class="grid">
        <select id="billBuilder" onchange="loadSites('billBuilder','billSite')"><option value="">-- Builder --</option></select>
        <select id="billSite"><option value="">-- Site --</option></select>
    </div>
    <label style="display:block; margin: 10px 0;"><input type="checkbox" id="gstToggle" onchange="updateBillDisplay()"> Apply GST (18%)</label>
    <button class="bill-btn" onclick="generateBill()">Generate Bill</button>
    <div id="billDisplay"></div>
</div>

<script>
    const API_URL = 'https://material-backend-trial.onrender.com';
    let fullInventory = [];
    let currentBillData = [];

    // Master Sync that triggers everything
    async function masterSync() {
        console.log("Syncing with server...");
        await loadBuilders();
        await initInventory();
    }

    async function loadBuilders() {
        try {
            const res = await fetch(`${API_URL}/builders`);
            const data = await res.json();
            const ids = ['builderSelect', 'dBuilder', 'rBuilder', 'repBuilder', 'billBuilder'];
            ids.forEach(id => {
                const s = document.getElementById(id);
                if(s) {
                    const currentVal = s.value;
                    s.innerHTML = '<option value="">-- Select Builder --</option>';
                    data.forEach(b => s.innerHTML += `<option value="${b._id}">${b.companyName}</option>`);
                    s.value = currentVal; 
                }
            });
        } catch (e) { console.error("Builder Load Fail", e); }
    }

    async function loadSites(bId, sId) {
        const val = document.getElementById(bId).value;
        const s = document.getElementById(sId);
        if(!val) {
            s.innerHTML = '<option value="">-- Select Site --</option>';
            return;
        }
        try {
            const res = await fetch(`${API_URL}/sites/${val}`);
            const data = await res.json();
            s.innerHTML = '<option value="">-- Select Site --</option>';
            data.forEach(site => s.innerHTML += `<option value="${site._id}">${site.siteName}</option>`);
        } catch (e) { console.error("Site Load Fail", e); }
    }

    async function initInventory() {
        try {
            const res = await fetch(`${API_URL}/inventory`);
            fullInventory = await res.json();
            const dItem = document.getElementById('dItem');
            if(dItem) {
                const currentVal = dItem.value;
                dItem.innerHTML = '<option value="">-- Select Item --</option>';
                fullInventory.forEach(i => dItem.innerHTML += `<option value="${i._id}">${i.itemName} (${i.category})</option>`);
                dItem.value = currentVal;
            }
        } catch (e) { console.error("Inventory Load Fail", e); }
    }

    function updateCategories() {
        const item = document.getElementById('itemName').value;
        const cat = document.getElementById('category');
        cat.innerHTML = '';
        const data = { 
            'MS Plate': ['3 x 24', '3 x 21', '3 x 18', '3 x 15', '3 x 12', '3 x 9', '3 x 6'], 
            'MS Props Jack': ['3 x 3', '2.5 x 2.5', '2 x 2'], 
            'Cuplock Vertical': ['3 Mtr', '2.5 Mtr', '2 Mtr', '1.5 Mtr', '1 Mtr', '0.5 Mtr'], 
            'MS Ledger': ['900 mm', '1200 mm', '1500 mm'], 
            'Ms Pipe': ['6 mtr', '3 mtr'], 'Channel': ['6 mtr', '3 mtr'], 'Ms Clamp': ['Fix', 'Round (360°)']
        };
        (data[item] || ['N/A']).forEach(s => cat.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function showStock(id, label) {
        const item = fullInventory.find(i => i._id === document.getElementById(id).value);
        document.getElementById(label).innerText = item ? `Available: ${item.availableStock}` : 'Available: 0';
    }

    async function saveBuilder() {
        const body = { companyName: document.getElementById('compName').value, mobile: document.getElementById('bMobile').value, email: document.getElementById('bEmail').value, gstNumber: document.getElementById('bGst').value, address: document.getElementById('bAddr').value };
        await fetch(`${API_URL}/add-builder`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        alert("Saved!"); masterSync();
    }

    async function saveSite() {
        const body = { builderId: document.getElementById('builderSelect').value, siteName: document.getElementById('sName').value, siteAddress: document.getElementById('sAddr').value };
        await fetch(`${API_URL}/add-site`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        alert("Site Linked!");
    }

    async function saveItem() {
        const body = { itemName: document.getElementById('itemName').value, category: document.getElementById('category').value, totalStock: Number(document.getElementById('qty').value) };
        await fetch(`${API_URL}/add-item`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        alert("Inventory Updated!"); masterSync();
    }

    async function processTxn(type) {
        const prefix = type === 'dispatch' ? 'd' : 'r';
        const body = { builderId: document.getElementById(`${prefix}Builder`).value, siteId: document.getElementById(`${prefix}Site`).value, itemId: document.getElementById(`${prefix}Item`).value, quantity: Number(document.getElementById(`${prefix}Qty`).value), rate: type === 'dispatch' ? Number(document.getElementById(`dRate`).value) : 0, date: document.getElementById(`${prefix}Date`).value };
        const res = await fetch(`${API_URL}/${type}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
        const result = await res.json();
        if(res.ok) { alert(`Success! Challan: ${result.challanNo}`); masterSync(); } else alert(result.message);
    }

    async function loadReturnItems() {
        const siteId = document.getElementById('rSite').value;
        const res = await fetch(`${API_URL}/site-balance/${siteId}`);
        const data = await res.json();
        const rItem = document.getElementById('rItem');
        rItem.innerHTML = '<option value="">-- Select Item --</option>';
        data.forEach(i => rItem.innerHTML += `<option value="${i.itemId}">${i.itemName} (${i.category}) [Site Bal: ${i.currentBalance}]</option>`);
    }

    async function getSiteReport() {
        const siteId = document.getElementById('repSite').value;
        const res = await fetch(`${API_URL}/site-balance/${siteId}`);
        const data = await res.json();
        let h = '<table><tr><th>Item</th><th>On Site</th></tr>';
        data.forEach(i => h += `<tr><td>${i.itemName} (${i.category})</td><td>${i.currentBalance}</td></tr>`);
        document.getElementById('reportContainer').innerHTML = h + '</table>';
    }

    async function generateBill() {
        const siteId = document.getElementById('billSite').value;
        const res = await fetch(`${API_URL}/calculate-bill/${siteId}`);
        currentBillData = await res.json();
        updateBillDisplay();
    }

    function updateBillDisplay() {
        let h = '<table><tr><th>Item</th><th>Qty</th><th>Duration</th><th>Days</th><th>Amt</th></tr>';
        let sub = 0;
        currentBillData.forEach(i => {
            h += `<tr><td>${i.itemName}</td><td>${i.qty}</td><td>${i.dDate}-${i.rDate}</td><td>${i.days}</td><td>₹${i.amount}</td></tr>`;
            sub += i.amount;
        });
        const gst = document.getElementById('gstToggle').checked ? sub * 0.18 : 0;
        document.getElementById('billDisplay').innerHTML = h + `</table><div class="total-box"><p>Subtotal: ₹${sub}</p><p>GST: ₹${gst}</p><h3>Total: ₹${sub + gst}</h3></div>`;
    }

    // Auto-sync on page load
    window.onload = masterSync;
</script>
</body>
</html>
